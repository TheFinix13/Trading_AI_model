# Multi-Pair Trading Agent -- single-service compose file.
#
#   docker compose up           # start dashboard on http://localhost:8000
#   docker compose up --build   # rebuild after a code change
#   docker compose logs -f      # tail logs
#
# Persistent state (journal DB, parquet bars, scorer joblibs) is
# bind-mounted from the host so re-creating the container doesn't wipe
# your trade history. See docs/deployment.md for setup notes.

version: "3.9"

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: multi-pair-trading-agent:latest
    container_name: trading-agent-dashboard
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - AGENT_MODE=${AGENT_MODE:-backtest}
      - SYMBOL=${SYMBOL:-EURUSD}
      - JOURNAL_DB=/app/journal.db
      - DATA_DIR=/app/data/parquet
      - MODEL_DIR=/app/models
      # News calendar refresh -- optional, no defaults needed.
      - NEWS_FEED_URL=${NEWS_FEED_URL:-}
      # Telegram alerts -- optional, see docs/deployment.md.
      - TG_BOT_TOKEN=${TG_BOT_TOKEN:-}
      - TG_CHAT_ID=${TG_CHAT_ID:-}
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./journal.db:/app/journal.db
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--max-time", "4", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
