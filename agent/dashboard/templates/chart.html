<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ symbol }} — Interactive Chart</title>
  <style>
    /* ── Light theme (default) ── */
    html[data-theme="light"] {
      --bg: #ffffff;
      --panel: #f8f9fa;
      --panel-2: #f0f1f3;
      --border: #dee2e6;
      --text: #212529;
      --muted: #6c757d;
      --green: #26a69a;
      --red: #ef5350;
      --blue: #2962ff;
      --amber: #f7931a;
      --cyan: #00bcd4;
      --cyan-dim: rgba(0,188,212,0.12);
      --orange: #f7931a;
      --orange-dim: rgba(247,147,26,0.15);
      --purple: #7b1fa2;
      --msg-agent-bg: #f0f1f3;
      --msg-agent-border: #dee2e6;
      --msg-agent-text: #212529;
      --msg-system-bg: rgba(222,226,230,0.5);
      --msg-system-border: #dee2e6;
      --msg-system-text: #6c757d;
      --input-bg: #ffffff;
      --input-border: #dee2e6;
      --input-text: #212529;
      --hover-bg: rgba(0,0,0,0.05);
      --toolbar-bg: #f8f9fa;
    }

    /* ── Dark theme ── */
    html[data-theme="dark"] {
      --bg: #131722;
      --panel: #1e222d;
      --panel-2: #1e222d;
      --border: #2a2e39;
      --text: #d1d4dc;
      --muted: #787b86;
      --green: #26a69a;
      --red: #ef5350;
      --blue: #2962ff;
      --amber: #f7931a;
      --cyan: #00bcd4;
      --cyan-dim: rgba(0,188,212,0.12);
      --orange: #f7931a;
      --orange-dim: rgba(247,147,26,0.15);
      --purple: #7b1fa2;
      --msg-agent-bg: #1e222d;
      --msg-agent-border: #2a2e39;
      --msg-agent-text: #d1d4dc;
      --msg-system-bg: rgba(42,46,57,0.5);
      --msg-system-border: #2a2e39;
      --msg-system-text: #787b86;
      --input-bg: #131722;
      --input-border: #2a2e39;
      --input-text: #d1d4dc;
      --hover-bg: rgba(42,46,57,0.5);
      --toolbar-bg: #1e222d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
    }

    .chart-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 24px; background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    .chart-header h1 {
      font-size: 15px; font-weight: 600; color: var(--text);
      display: flex; align-items: center; gap: 10px;
    }
    .chart-header h1 .pill {
      display: inline-block; padding: 2px 10px; border-radius: 12px;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;
      color: #fff;
    }
    .pill.live { background: var(--red); }
    .pill.paper { background: var(--blue); }
    .pill.backtest { background: var(--amber); color: #131722; }

    .header-controls {
      display: flex; gap: 8px; align-items: center;
    }

    .theme-toggle {
      padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 16px;
      cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 30px;
    }
    .theme-toggle:hover { background: var(--hover-bg); color: var(--text); }

    .ai-master-toggle {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 14px; border-radius: 4px;
      border: 1px solid var(--blue);
      background: transparent; color: var(--blue);
      font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all 0.18s;
      white-space: nowrap;
    }
    .ai-master-toggle:hover {
      background: rgba(41,98,255,0.15);
    }
    .ai-master-toggle.active {
      background: var(--blue); color: #fff;
    }
    .ai-toggle-icon { font-size: 13px; }

    .analysis-tf-bar {
      display: flex; gap: 3px; align-items: center;
    }
    .analysis-tf-btn {
      padding: 4px 10px; border-radius: 4px; border: none;
      background: transparent; color: var(--muted); font-size: 11px;
      font-weight: 500; cursor: pointer; transition: all 0.15s;
      letter-spacing: 0.03em;
    }
    .analysis-tf-btn:hover { background: var(--hover-bg); color: var(--text); }
    .analysis-tf-btn.active {
      background: var(--blue); color: #ffffff;
      font-weight: 600;
    }

    .refresh-btn, .reset-btn {
      padding: 4px 10px; border-radius: 4px; border: none;
      background: transparent; color: var(--muted); font-size: 14px;
      cursor: pointer; transition: all 0.15s;
    }
    .refresh-btn:hover, .reset-btn:hover { background: var(--hover-bg); color: var(--text); }
    .refresh-btn.loading { animation: spin 1s linear infinite; pointer-events: none; opacity: 0.5; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ── Annotations panel section ── */
    .annot-section {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }
    .annot-section-title {
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .annot-item {
      padding: 5px 8px; border-radius: 4px;
      font-size: 11.5px; line-height: 1.5;
      margin-bottom: 3px; cursor: pointer;
      transition: background 0.12s;
    }
    .annot-item:hover { background: var(--hover-bg); }
    .annot-item.demand { color: var(--green); border-left: 3px solid var(--green); }
    .annot-item.supply { color: var(--red); border-left: 3px solid var(--red); }
    .annot-item.level  { color: var(--amber); border-left: 3px solid var(--amber); }
    .annot-item.bos-bull { color: var(--green); border-left: 3px solid var(--green); }
    .annot-item.bos-bear { color: var(--red); border-left: 3px solid var(--red); }
    .annot-item.fvg-bull { color: var(--cyan); border-left: 3px solid var(--cyan); }
    .annot-item.fvg-bear { color: var(--cyan); border-left: 3px solid var(--cyan); }

    .annot-detail {
      display: none; margin-top: 4px; padding: 4px 6px;
      background: var(--hover-bg); border-radius: 3px;
      font-size: 10.5px; color: var(--muted); line-height: 1.5;
    }
    .annot-item.expanded .annot-detail { display: block; }

    .annot-empty {
      font-size: 11px; color: var(--muted); font-style: italic;
      padding: 4px 0;
    }

    #annot-container {
      overflow-y: auto;
      max-height: calc(100vh - 360px);
    }
  </style>
</head>
<body>
  {% set active_page = 'chart' %}
  {% include "_nav.html" %}

  <div class="chart-header">
    <h1>{{ symbol }} — Interactive Chart <span class="pill {{ mode }}">{{ mode }}</span></h1>
    <div class="header-controls">
      <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark theme">☀️</button>
      <button class="ai-master-toggle" id="ai-master-toggle" title="Toggle AI analysis annotations in the panel">
        <span class="ai-toggle-icon">🤖</span> Show AI Analysis
      </button>
      <div class="analysis-tf-bar" id="analysis-tf-bar">
        <button class="analysis-tf-btn" data-tf="M5">M5</button>
        <button class="analysis-tf-btn active" data-tf="M15">M15</button>
        <button class="analysis-tf-btn" data-tf="H1">H1</button>
        <button class="analysis-tf-btn" data-tf="H4">H4</button>
        <button class="analysis-tf-btn" data-tf="D1">D1</button>
      </div>
      <button class="reset-btn" id="reset-chart-btn" title="Reset chart view">↩️</button>
      <button class="refresh-btn" id="refresh-data-btn" title="Refresh agent analysis">🔄</button>
    </div>
  </div>

  <div id="chart-page-layout">
  <div id="chart-left-col">
    <!-- TradingView Widget BEGIN -->
    <div class="tradingview-widget-container" style="height:100%;width:100%">
      <div id="tradingview_chart" style="height:100%;width:100%"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
      <script type="text/javascript">
      var tvWidget = null;
      var currentTVInterval = "60";
      var TF_TO_TV = {"M5": "5", "M15": "15", "H1": "60", "H4": "240", "D1": "D"};

      function getCurrentTheme() {
        return localStorage.getItem('chart-theme') || 'light';
      }

      function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('chart-theme', theme);
        var btn = document.getElementById('theme-toggle');
        if (btn) btn.textContent = theme === 'dark' ? '🌙' : '☀️';
      }

      applyTheme(getCurrentTheme());

      function createTVWidget(interval) {
        currentTVInterval = interval || "60";
        if (tvWidget) {
          var container = document.getElementById("tradingview_chart");
          container.innerHTML = "";
        }
        var theme = getCurrentTheme();
        tvWidget = new TradingView.widget({
          "autosize": true,
          "symbol": "FOREXCOM:EURUSD",
          "interval": currentTVInterval,
          "timezone": "America/New_York",
          "theme": theme,
          "style": "1",
          "locale": "en",
          "toolbar_bg": theme === "dark" ? "#1e222d" : "#f8f9fa",
          "enable_publishing": false,
          "allow_symbol_change": false,
          "hide_top_toolbar": false,
          "hide_legend": false,
          "hide_side_toolbar": false,
          "save_image": true,
          "show_popup_button": true,
          "popup_width": "1000",
          "popup_height": "650",
          "withdateranges": true,
          "details": true,
          "calendar": true,
          "studies": [],
          "container_id": "tradingview_chart",
          "overrides": {
            "mainSeriesProperties.showSessionBreaks": true,
            "paneProperties.separatorColor": theme === "dark" ? "#2a2e39" : "#dee2e6"
          }
        });
      }
      createTVWidget(TF_TO_TV["M15"]);
      </script>
    </div>
    <!-- TradingView Widget END -->
  </div><!-- /chart-left-col -->
  {% include "_chart_panel.html" %}
  </div><!-- /chart-page-layout -->

<script>
(function() {
  var currentTF = "M15";
  var showAnalysis = false;
  var cachedAnnotations = null;

  async function fetchJSON(url) {
    var resp = await fetch(url);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    return resp.json();
  }

  // ── Theme toggle ────────────────────────────────────────────────────────
  var themeToggle = document.getElementById("theme-toggle");
  if (themeToggle) {
    themeToggle.addEventListener("click", function() {
      var current = getCurrentTheme();
      var next = current === "dark" ? "light" : "dark";
      applyTheme(next);
      createTVWidget(currentTVInterval);
    });
  }

  // ── Reset chart ─────────────────────────────────────────────────────────
  var resetBtn = document.getElementById("reset-chart-btn");
  if (resetBtn) {
    resetBtn.addEventListener("click", function() {
      createTVWidget(currentTVInterval);
    });
  }

  // ── Analysis TF selector ──────────────────────────────────────────────

  document.querySelectorAll(".analysis-tf-btn").forEach(function(btn) {
    btn.addEventListener("click", function() {
      document.querySelectorAll(".analysis-tf-btn").forEach(function(b) { b.classList.remove("active"); });
      btn.classList.add("active");
      currentTF = btn.dataset.tf;

      var tvInterval = TF_TO_TV[currentTF] || "60";
      createTVWidget(tvInterval);

      if (showAnalysis) loadAnnotations(currentTF);

      document.dispatchEvent(new CustomEvent('chart:tf_switch', {detail: {timeframe: currentTF}}));
    });
  });

  // ── AI Analysis toggle ────────────────────────────────────────────────

  var masterToggleBtn = document.getElementById("ai-master-toggle");
  masterToggleBtn.addEventListener("click", function() {
    showAnalysis = !showAnalysis;
    masterToggleBtn.classList.toggle("active", showAnalysis);
    if (showAnalysis) {
      loadAnnotations(currentTF);
    } else {
      clearAnnotationsPanel();
    }
  });

  // ── Annotations rendering in panel ────────────────────────────────────

  function getOrCreateAnnotContainer() {
    var existing = document.getElementById("annot-container");
    if (existing) return existing;

    var panel = document.getElementById("agent-panel");
    if (!panel) return null;

    var msgsFeed = document.getElementById("ap-messages");
    var container = document.createElement("div");
    container.id = "annot-container";
    panel.insertBefore(container, msgsFeed);
    return container;
  }

  function clearAnnotationsPanel() {
    var c = document.getElementById("annot-container");
    if (c) c.innerHTML = "";
    cachedAnnotations = null;
  }

  function renderAnnotations(data) {
    var container = getOrCreateAnnotContainer();
    if (!container) return;
    container.innerHTML = "";

    var zones = data.zones || [];
    var levels = data.levels || [];
    var bosMarkers = data.bos_markers || [];
    var fvgs = data.fvgs || [];

    var demandZones = zones.filter(function(z) { return z.direction === "long"; });
    var supplyZones = zones.filter(function(z) { return z.direction === "short"; });

    if (demandZones.length > 0) {
      var sec = createSection("Demand Zones");
      demandZones.forEach(function(z) {
        var text = z.top.toFixed(4) + " – " + z.bottom.toFixed(4);
        if (z.label) text = z.label + ": " + text;
        var detail = "Impulse: " + (z.impulse_pips || 0).toFixed(1) + " pips";
        if (z.tooltip) detail += "\n" + z.tooltip;
        sec.appendChild(createAnnotItem(text, detail, "demand"));
      });
      container.appendChild(sec);
    }

    if (supplyZones.length > 0) {
      var sec2 = createSection("Supply Zones");
      supplyZones.forEach(function(z) {
        var text = z.top.toFixed(4) + " – " + z.bottom.toFixed(4);
        if (z.label) text = z.label + ": " + text;
        var detail = "Impulse: " + (z.impulse_pips || 0).toFixed(1) + " pips";
        if (z.tooltip) detail += "\n" + z.tooltip;
        sec2.appendChild(createAnnotItem(text, detail, "supply"));
      });
      container.appendChild(sec2);
    }

    if (levels.length > 0) {
      var sec3 = createSection("Daily Levels");
      levels.forEach(function(l) {
        var text = (l.label || "Level") + ": " + l.price.toFixed(4);
        var detail = l.tooltip || "";
        sec3.appendChild(createAnnotItem(text, detail, "level"));
      });
      container.appendChild(sec3);
    }

    var bosBull = bosMarkers.filter(function(m) { return m.text && m.text.toLowerCase().indexOf("bull") >= 0; });
    var bosBear = bosMarkers.filter(function(m) { return m.text && m.text.toLowerCase().indexOf("bear") >= 0; });
    if (bosBull.length > 0 || bosBear.length > 0) {
      var sec4 = createSection("Break of Structure");
      bosBull.forEach(function(m) {
        sec4.appendChild(createAnnotItem("Bullish BOS" + (m.text ? " — " + m.text : ""), m.tooltip || "", "bos-bull"));
      });
      bosBear.forEach(function(m) {
        sec4.appendChild(createAnnotItem("Bearish BOS" + (m.text ? " — " + m.text : ""), m.tooltip || "", "bos-bear"));
      });
      container.appendChild(sec4);
    }

    if (fvgs.length > 0) {
      var sec5 = createSection("Fair Value Gaps");
      fvgs.forEach(function(f) {
        var dir = f.direction === "long" ? "Bullish" : "Bearish";
        var text = dir + " FVG: " + f.top.toFixed(4) + " – " + f.bottom.toFixed(4);
        if (f.label) text = f.label;
        var detail = "Size: " + (f.size_pips || 0).toFixed(1) + " pips";
        if (f.tooltip) detail += "\n" + f.tooltip;
        var cls = f.direction === "long" ? "fvg-bull" : "fvg-bear";
        sec5.appendChild(createAnnotItem(text, detail, cls));
      });
      container.appendChild(sec5);
    }

    if (zones.length === 0 && levels.length === 0 && bosMarkers.length === 0 && fvgs.length === 0) {
      var empty = document.createElement("div");
      empty.className = "annot-empty";
      empty.textContent = "No annotations available for " + currentTF;
      container.appendChild(empty);
    }
  }

  function createSection(title) {
    var sec = document.createElement("div");
    sec.className = "annot-section";
    var h = document.createElement("div");
    h.className = "annot-section-title";
    h.textContent = title;
    sec.appendChild(h);
    return sec;
  }

  function createAnnotItem(text, detail, cls) {
    var item = document.createElement("div");
    item.className = "annot-item " + cls;

    var span = document.createElement("span");
    span.textContent = text;
    item.appendChild(span);

    if (detail) {
      var det = document.createElement("div");
      det.className = "annot-detail";
      det.textContent = detail;
      item.appendChild(det);
    }

    item.addEventListener("click", function() {
      item.classList.toggle("expanded");
    });

    return item;
  }

  // ── Load annotations from backend ─────────────────────────────────────

  async function loadAnnotations(tf) {
    try {
      var data = await fetchJSON("/api/chart/annotations?timeframe=" + tf + "&limit=1500");
      cachedAnnotations = data;
      renderAnnotations(data);
      document.dispatchEvent(new CustomEvent('chart:loaded', {detail: {timeframe: tf, annotations: data}}));
    } catch (err) {
      console.error("Failed to load annotations:", err);
    }
  }

  // ── Refresh button ────────────────────────────────────────────────────

  var refreshBtn = document.getElementById("refresh-data-btn");
  if (refreshBtn) {
    refreshBtn.addEventListener("click", async function() {
      refreshBtn.classList.add("loading");
      refreshBtn.title = "Refreshing…";
      try {
        var resp = await fetch("/api/chart/refresh_data", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ timeframes: ["D1", "H4", "H1", "M15", "M5"] }),
        });
        var data = await resp.json();
        if (data.ok) {
          refreshBtn.title = "Data refreshed — reloading analysis";
          if (showAnalysis) loadAnnotations(currentTF);
        } else {
          refreshBtn.title = "Refresh failed: " + (data.error || "unknown");
        }
      } catch (err) {
        refreshBtn.title = "Refresh error: " + err.message;
      } finally {
        refreshBtn.classList.remove("loading");
        setTimeout(function() { refreshBtn.title = "Refresh agent analysis"; }, 4000);
      }
    });
  }

  // Expose state for the panel script
  window._chartState = {
    getTF: function() { return currentTF; },
    getAnnotations: function() { return cachedAnnotations; },
    getCandles: function() { return null; },
    getHumanDrawings: function() { return []; },
  };
})();
</script>
</body>
</html>
