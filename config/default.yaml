symbol: EURUSD
timeframes:
  htf: D1
  mtf: H4
  ltf: H1
  ttf: M15

primary_timeframe: H1

risk:
  pct_target: 0.01
  pct_floor: 0.03
  pct_floor_threshold_account: 300
  daily_dd_halt_pct: 0.03
  max_open_positions: 1
  lot_step: 0.01
  lot_min: 0.01
  lot_hard_cap_under_300: 0.01
  lot_hard_cap_under_1000: 0.10
  lot_hard_cap: 1.0

session:
  timezone: Europe/London
  no_trade_windows:
    - name: friday_close
      day_of_week: 4
      from: "20:00"
      to: "23:59"
    - name: sunday_open
      day_of_week: 6
      from: "20:00"
      to: "23:59"

detectors:
  swing_lookback: 5
  zone_min_impulse_pips: 30
  zone_max_age_bars: 500
  fvg_min_size_pips: 5
  fib_levels: [0.382, 0.5, 0.618, 0.786]
  trendline_min_swings: 2
  liquidity_wick_min_ratio: 2.0

backtest:
  # Backtest balance is for *edge validation* only. The live demo starts at $100.
  # $10k here lets the risk manager size correctly so the backtest tells us whether
  # the strategy itself has edge in expectation.
  initial_balance: 10000.0
  spread_pips: 1.0
  commission_per_lot: 7.0
  slippage_pips: 0.5
  pip_value_per_lot: 10.0
  move_be_at_r: 1.0
  be_lock_r: 0.0
